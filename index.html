        body {

            color: var(--tactical-silver);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .font-mono {

            background-color: var(--tactical-charcoal);

            border-style: solid;
            border-color: rgba(75, 83, 32, 0.2);
            border-radius: 0.5rem;
        }

        .tactical-button {
            background-color: var(--tactical-army);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 0.25rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .tactical-button:hover:not(:disabled) {
            background-color: #5d6628;
            transform: translateY(-1px);
        }

        .tactical-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .tactical-input {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(75, 83, 32, 0.3);
            color: white;
            padding: 0.75rem;
            border-radius: 0.25rem;
            width: 100%;
        }

        .tactical-input:focus {
            outline: none;
            border-color: var(--tactical-army);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--tactical-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--tactical-army);
            border-radius: 10px;
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        window.VANGUARD_DATA = {"logs":[{"id":"1774478172616","date":"2026-03-25","pushups":10,"squats":15,"plankSeconds":20},{"id":"1774989006198","date":"2026-03-31","pushups":15,"squats":40,"plankSeconds":105},{"id":"1774478227501","date":"2026-04-01","pushups":14,"squats":19,"plankSeconds":40},{"id":"1774478320221","date":"2026-04-08","pushups":25,"squats":17,"plankSeconds":30}],"pyramidLogs":[{"week":1,"lastRepRange":4,"totalReps":10},{"week":2,"lastRepRange":5,"totalReps":15},{"week":3,"lastRepRange":8,"totalReps":36},{"week":4,"lastRepRange":8,"totalReps":72},{"week":5,"lastRepRange":2,"totalReps":3},{"week":6,"lastRepRange":1,"totalReps":100},{"week":7,"lastRepRange":10,"totalReps":55}],"completedExercises":{"1-0":true},"week":7,"pyramidIndex":10};

            { day: 2, title: "Lower Body", routine: "5 Rounds", details: "20 Air Squats, 10 Lunges (each leg), 30 Jumping Jacks.", exercises: ["20 Air Squats", "10 Lunges (each leg), 30 Jumping Jacks"], type: "rounds" },

            { day: 5, title: "Core Stability", routine: "4 Rounds", details: "15 Leg Raises, 20 Russian Twists, 15 Bird-Dogs.", exercises: ["15 Leg Raises", "20 Russian Twists", "15 Bird-Dogs"], type: "rounds" },
            { day: 6, title: "Saturday Diagnostic", routine: "The Test", details: "Max Push-ups (2m), Max Air Squats (2m), Max Plank Hold.", exercises: ["Max Push-ups (2 min)", "Max Air Squats (2 min)", "Max Plank Hold"], type: "test" },

        const EXERCISE_INSTRUCTIONS = [
            { 
                name: "Push-up Pyramid (1-10-1)",
                instructions: `Pyramid Structure: Start with 1 rep, then rest. Perform 2 reps, then rest. Continue increasing by 1 rep until you reach 10. Once 10 is reached, descend back to 1 rep (9, 8, 7... 1). Rest periods should be short (approx. 5-10 seconds per rep performed).

Starting Position: High plank position, hands slightly wider than shoulders, fingers forward, wrists under shoulders.

Body Alignment: Keep back flat, neck neutral (look slightly ahead, not down), and glutes/abs tight to prevent hips from sagging.

Movement: Inhale while lowering slowly, keeping elbows tucked at 45 degrees (not flared).

Range of Motion: Lower until the chest is near the floor; push back up to a full extension.

Common Mistakes: Avoid shrugging shoulders, allowing hips to sag, or pointing elbows directly out to the sides.

Modifications for Beginners:
- Incline Push-ups: Place hands on a bench, wall, or stairs to reduce body weight resistance.
- Knee Push-ups: Perform the movement with knees on the ground, keeping a straight line from head to knees.`
            },
            { 
                name: "Air Squats",
                instructions: `Stance: Feet shoulder-width apart or slightly wider, with toes pointing forward or slightly outward.

Initiation: Begin the movement by sending your hips back and down, as if sitting in an invisible chair, rather than starting with the knees.

Chest and Back: Maintain a "proud" chest, keeping it upright, and keep the back straight (lumbar curve maintained).

Depth: Lower until your hips are below the top of your knees (below parallel).

Knees: Ensure knees track outward over the toes and do not collapse inward.

Heels: Keep the entire foot, especially the heels, firmly on the ground.

Finish: Rise by pushing through your heels, extending the hips and knees to full extension at the top.

Common Mistakes: Avoid rounding the back (loss of lumbar curve), allowing knees to collapse inward, or lifting heels off the ground. Ensure the hip crease passes below the knee for full benefit.

Tips for Beginners:
- Use a Target: Use a chair or bench to ensure you are reaching the correct depth.
- Counterbalance: Extend your arms forward as you descend to help keep your back straight.
- Mobility: Focus on hip and ankle mobility to improve depth.`
            },
            { name: "Lunges" },

        ];

        // --- Components ---
        const RestTimer = ({ initialSeconds, onComplete, autoStart = false }) => {
            const [seconds, setSeconds] = useState(initialSeconds);
            const [isActive, setIsActive] = useState(autoStart);
            const alarmRef = useRef(null);

            useEffect(() => {
                alarmRef.current = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            }, []);

            useEffect(() => {
                setSeconds(initialSeconds);
                if (autoStart) setIsActive(true);
            }, [initialSeconds, autoStart]);

            useEffect(() => {
                let interval = null;
                if (isActive && seconds > 0) {
                    interval = setInterval(() => {
                        setSeconds((s) => s - 1);
                    }, 1000);
                } else if (seconds === 0 && isActive) {
                    setIsActive(false);
                    if (alarmRef.current) {
                        alarmRef.current.play().catch(e => console.error("Audio play failed", e));
                    }
                    if (onComplete) onComplete();
                }
                return () => clearInterval(interval);
            }, [isActive, seconds, onComplete]);

            return (
                <div className="flex items-center gap-2 bg-tactical-bg p-2 rounded-lg border border-tactical-army/30">
                    <div className={`text-xl font-mono font-bold w-16 ${seconds === 0 ? 'text-tactical-red animate-pulse' : 'text-tactical-army'}`}>
                        {Math.floor(seconds / 60).toString().padStart(2, '0')}:{(seconds % 60).toString().padStart(2, '0')}
                    </div>
                    <div className="flex-1 flex items-center gap-1">
                        <button 
                            onClick={() => {
                                if (isActive) setSeconds(0);
                                else setIsActive(true);
                            }}
                            disabled={seconds === 0}
                            className="tactical-button py-1 px-2 disabled:opacity-50 text-[10px]"
                        >
                            {isActive ? "I don't need rest" : 'Start Rest'}
                        </button>
                        <button 
                            onClick={() => { setSeconds(initialSeconds); setIsActive(false); }}
                            className="p-1 text-tactical-silver/50 hover:text-tactical-silver"
                        >
                            <Icon name="rotate-ccw" size={14} className="text-tactical-silver/50" />
                        </button>
                    </div>
                </div>
            );
        };

        const AMRAPTimer = () => {
            const [timeLeft, setTimeLeft] = useState(15 * 60);
            const [isActive, setIsActive] = useState(false);

            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft((t) => t - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setIsActive(false);
                    clearInterval(interval);
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            return (
                <div className="flex flex-col gap-2 bg-tactical-bg p-4 rounded-lg border border-tactical-army/30">
                    <div className="flex justify-between items-center">
                        <span className="text-xs uppercase tracking-widest text-tactical-army font-bold">AMRAP Countdown</span>
                        <Icon name="timer" size={16} className="text-tactical-army" />
                    </div>
                    <div className="text-4xl font-mono text-center py-2 font-black tracking-tighter">
                        {formatTime(timeLeft)}
                    </div>
                    <div className="flex gap-2">
                        <button 
                            onClick={() => setIsActive(!isActive)}
                            className="flex-1 tactical-button py-3 text-white"
                        >
                            <Icon name={isActive ? "pause" : "play"} size={16} className="text-white" />
                            {isActive ? 'Pause' : 'Start Mission'}
                        </button>
                        <button 
                            onClick={() => { setTimeLeft(15 * 60); setIsActive(false); }}
                            className="p-2 bg-tactical-charcoal border border-tactical-army/30 rounded hover:bg-tactical-army/20"
                        >
                            <Icon name="rotate-ccw" size={20} className="text-white" />
                        </button>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('MISSION');
            const [logs, setLogs] = useState([]);
            const [pyramidLogs, setPyramidLogs] = useState([]);
            const [completedExercises, setCompletedExercises] = useState({});
            const [expandedExercise, setExpandedExercise] = useState(null);
            const [week, setWeek] = useState(1);
            const [pyramidIndex, setPyramidIndex] = useState(0);
            const [isPyramidResting, setIsPyramidResting] = useState(false);
            
            const [showClearModal, setShowClearModal] = useState(false);
            const [showIncompleteModal, setShowIncompleteModal] = useState(false);
            const [logToDelete, setLogToDelete] = useState(null);
            
            const [logDate, setLogDate] = useState(new Date().toISOString().split('T')[0]);
            const [pushups, setPushups] = useState('');
            const [squats, setSquats] = useState('');
            const [plankMin, setPlankMin] = useState('');
            const [plankSec, setPlankSec] = useState('');

            const strengthChartRef = useRef(null);
            const plankChartRef = useRef(null);
            const pyramidChartRef = useRef(null);
            const strengthChartInstance = useRef(null);
            const plankChartInstance = useRef(null);
            const pyramidChartInstance = useRef(null);

            useEffect(() => {
                // Load injected data if available
                if (window.VANGUARD_DATA) {
                    const { logs: iLogs, pyramidLogs: iPyramidLogs, completedExercises: iCompleted, week: iWeek, pyramidIndex: iPyramid } = window.VANGUARD_DATA;
                    if (iLogs) setLogs(iLogs);
                    if (iPyramidLogs) setPyramidLogs(iPyramidLogs);
                    if (iCompleted) setCompletedExercises(iCompleted);
                    if (iWeek) setWeek(iWeek);
                    if (iPyramid !== undefined) setPyramidIndex(iPyramid);
                } else {
                    const savedLogs = localStorage.getItem('blackops_logs');
                    try { if (savedLogs) setLogs(JSON.parse(savedLogs)); } catch (e) { console.error(e); }
                    const savedPyramidLogs = localStorage.getItem('blackops_pyramid_logs');
                    try { if (savedPyramidLogs) setPyramidLogs(JSON.parse(savedPyramidLogs)); } catch (e) { console.error(e); }
                    const savedCompleted = localStorage.getItem('blackops_completed');
                    try { if (savedCompleted) setCompletedExercises(JSON.parse(savedCompleted)); } catch (e) { console.error(e); }
                    const savedWeek = localStorage.getItem('blackops_week');
                    if (savedWeek) setWeek(parseInt(savedWeek));
                    const savedPyramid = localStorage.getItem('blackops_pyramid_index');
                    if (savedPyramid) setPyramidIndex(parseInt(savedPyramid));
                }
            }, []);

            useEffect(() => { localStorage.setItem('blackops_logs', JSON.stringify(logs)); }, [logs]);
            useEffect(() => { localStorage.setItem('blackops_pyramid_logs', JSON.stringify(pyramidLogs)); }, [pyramidLogs]);
            useEffect(() => { localStorage.setItem('blackops_completed', JSON.stringify(completedExercises)); }, [completedExercises]);
            useEffect(() => { localStorage.setItem('blackops_week', week.toString()); }, [week]);
            useEffect(() => { localStorage.setItem('blackops_pyramid_index', pyramidIndex.toString()); }, [pyramidIndex]);

            // Chart rendering
            useEffect(() => {
                if (activeTab === 'INTELLIGENCE') {
                    // Strength Chart
                    if (strengthChartRef.current && logs.length >= 2) {
                        if (strengthChartInstance.current) strengthChartInstance.current.destroy();
                        const ctx = strengthChartRef.current.getContext('2d');
                        strengthChartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: logs.map(l => {
                                    const d = new Date(l.date);
                                    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                                }),
                                datasets: [
                                    {
                                        label: 'Push-ups',
                                        data: logs.map(l => l.pushups),
                                        borderColor: '#4B5320',
                                        backgroundColor: 'rgba(75, 83, 32, 0.2)',
                                        fill: true,
                                        tension: 0.4,
                                    },
                                    {
                                        label: 'Air Squats',
                                        data: logs.map(l => l.squats),
                                        borderColor: '#D3D3D3',
                                        backgroundColor: 'rgba(211, 211, 211, 0.1)',
                                        fill: true,
                                        tension: 0.4,
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        position: 'top',
                                        labels: { color: '#D3D3D3', font: { weight: 'bold' } }
                                    }
                                },
                                scales: {
                                    x: { grid: { color: 'rgba(211, 211, 211, 0.05)' }, ticks: { color: '#D3D3D3' } },
                                    y: { grid: { color: 'rgba(211, 211, 211, 0.05)' }, ticks: { color: '#D3D3D3' } }
                                }
                            }
                        });
                    }

                    // Plank Chart
                    if (plankChartRef.current && logs.length >= 2) {
                        if (plankChartInstance.current) plankChartInstance.current.destroy();
                        const ctx = plankChartRef.current.getContext('2d');
                        plankChartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: logs.map(l => {
                                    const d = new Date(l.date);
                                    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                                }),
                                datasets: [
                                    {
                                        label: 'Plank (s)',
                                        data: logs.map(l => l.plankSeconds),
                                        borderColor: '#991b1b',
                                        backgroundColor: 'rgba(153, 27, 27, 0.1)',

                                        tension: 0.4,
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        position: 'top',
                                        labels: { color: '#D3D3D3', font: { weight: 'bold' } }
                                    }
                                },
                                scales: {
                                    x: { grid: { color: 'rgba(211, 211, 211, 0.05)' }, ticks: { color: '#D3D3D3' } },
                                    y: { grid: { color: 'rgba(211, 211, 211, 0.05)' }, ticks: { color: '#D3D3D3' } }
                                }
                            }
                        });
                    }

                    // Pyramid Chart
                    if (pyramidChartRef.current && pyramidLogs.length >= 2) {
                        if (pyramidChartInstance.current) pyramidChartInstance.current.destroy();
                        const ctx = pyramidChartRef.current.getContext('2d');
                        pyramidChartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: pyramidLogs.map(l => `Week ${l.week}`),
                                datasets: [
                                    {
                                        label: 'Total Reps',
                                        data: pyramidLogs.map(l => l.totalReps),
                                        borderColor: '#4B5320',
                                        backgroundColor: 'rgba(75, 83, 32, 0.2)',
                                        fill: true,
                                        tension: 0.4,
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        position: 'top',
                                        labels: { color: '#D3D3D3', font: { weight: 'bold' } }
                                    }
                                },
                                scales: {
                                    x: { grid: { color: 'rgba(211, 211, 211, 0.05)' }, ticks: { color: '#D3D3D3' } },
                                    y: { grid: { color: 'rgba(211, 211, 211, 0.05)' }, ticks: { color: '#D3D3D3' } }
                                }
                            }
                        });
                    }
                }

                return () => {
                    if (strengthChartInstance.current) strengthChartInstance.current.destroy();
                    if (plankChartInstance.current) plankChartInstance.current.destroy();
                    if (pyramidChartInstance.current) pyramidChartInstance.current.destroy();
                };
            }, [activeTab, logs, pyramidLogs]);

            const logPyramidProgress = (currentIndex) => {
                const lastRepRange = currentIndex > 0 ? PYRAMID_SEQUENCE[Math.min(currentIndex - 1, PYRAMID_SEQUENCE.length - 1)] : 0;
                const totalReps = PYRAMID_SEQUENCE.slice(0, currentIndex).reduce((a, b) => a + b, 0);
                
                const newPyramidLog = {
                    week,
                    lastRepRange,
                    totalReps
                };

                setPyramidLogs(prev => {
                    const filtered = prev.filter(l => l.week !== week);
                    return [...filtered, newPyramidLog].sort((a, b) => a.week - b.week);
                });
            };

            const removePyramidProgress = () => {
                setPyramidLogs(prev => prev.filter(l => l.week !== week));
            };

            const toggleExercise = (dayIndex, exerciseIndex) => {
                const key = `${dayIndex}-${exerciseIndex}`;
                setCompletedExercises(prev => {
                    const newState = !prev[key];
                    if (key === '1-0') {
                        if (newState) {
                            logPyramidProgress(pyramidIndex);
                        } else {
                            removePyramidProgress();
                        }
                    }
                    return { ...prev, [key]: newState };
                });
            };

            const handlePyramidStepComplete = () => {
                setIsPyramidResting(false);
                if (pyramidIndex < PYRAMID_SEQUENCE.length - 1) {
                    setPyramidIndex(prev => prev + 1);
                } else {
                    const finalIndex = PYRAMID_SEQUENCE.length;
                    setPyramidIndex(finalIndex);
                    setCompletedExercises(prev => ({ ...prev, '1-0': true }));
                    logPyramidProgress(finalIndex);
                }
            };

            const submitDiagnostic = () => {
                if (!pushups || !squats || !plankMin || !plankSec) return;
                const totalPlankSeconds = parseInt(plankMin) * 60 + parseInt(plankSec);
                const newLog = { 
                    id: Date.now().toString(), 
                    date: logDate, 
                    pushups: parseInt(pushups), 
                    squats: parseInt(squats), 
                    plankSeconds: totalPlankSeconds 
                };
                setLogs(prev => [...prev, newLog].sort((a, b) => a.date.localeCompare(b.date)));
                setPushups(''); setSquats(''); setPlankMin(''); setPlankSec('');
                setActiveTab('INTELLIGENCE');
            };

            const handleLogSubmit = (e) => {
                e.preventDefault();
                submitDiagnostic();
            };

            const clearAllData = () => {
                setLogs([]); setCompletedExercises({}); setWeek(1); setPyramidIndex(0); setIsPyramidResting(false);
                localStorage.clear();
                setShowClearModal(false);

                                                        {!hasInstructions && (
                                                            <div className="border-2 border-tactical-red/40 px-2 py-0.5 rounded rotate-[-12deg] bg-tactical-red/5">
                                                                <span className="text-[10px] font-black text-tactical-red uppercase tracking-tighter">Classified</span>
                                                            </div>
                                                        )}
                                                        {hasInstructions && (
                                                            isExpanded ? <Icon name="chevron-up" size={16} className="text-tactical-army" /> : <Icon name="chevron-down" size={16} className="text-tactical-army" />
                                                        )}
                                                    </div>
                                                </button>
                                                {hasInstructions && isExpanded && (
                                                    <div className="px-4 pb-4 border-t border-tactical-army/10 pt-3 fade-in">
                                                        <p className="text-xs text-tactical-silver/80 leading-relaxed italic whitespace-pre-line">
                                                            {ex.instructions}
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="p-4 border-2 border-dashed border-tactical-army/20 rounded-lg bg-tactical-army/5">
                                    <p className="text-[10px] text-center text-tactical-army font-black uppercase tracking-[0.2em]">
                                        Discipline is the foundation of excellence. Execute every rep with precision.
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-tactical-charcoal border-t border-tactical-army/30 px-4 py-3 flex justify-between items-start z-50">
                        <button 
                            onClick={() => setActiveTab('MISSION')} 
                            className={`flex flex-col items-center gap-1 transition-colors flex-1 ${activeTab === 'MISSION' ? 'text-tactical-army' : 'text-tactical-silver/40'}`}
                        >
                            <Icon name="dumbbell" size={22} color={activeTab === 'MISSION' ? '#4B5320' : ''} />
                            <span className="text-[10px] font-black uppercase text-center leading-tight">Mission</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('LOG')} 
                            className={`flex flex-col items-center gap-1 transition-colors flex-1 ${activeTab === 'LOG' ? 'text-tactical-army' : 'text-tactical-silver/40'}`}
                        >
                            <Icon name="clipboard-list" size={22} color={activeTab === 'LOG' ? '#4B5320' : ''} />
                            <span className="text-[10px] font-black uppercase text-center leading-tight">Mission Logs</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('INTELLIGENCE')} 
                            className={`flex flex-col items-center gap-1 transition-colors flex-1 ${activeTab === 'INTELLIGENCE' ? 'text-tactical-army' : 'text-tactical-silver/40'}`}
                        >
                            <Icon name="bar-chart-3" size={22} color={activeTab === 'INTELLIGENCE' ? '#4B5320' : ''} />
                            <span className="text-[10px] font-black uppercase text-center leading-tight">Intel</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('FIELD_MANUAL')} 
                            className={`flex flex-col items-center gap-1 transition-colors flex-1 ${activeTab === 'FIELD_MANUAL' ? 'text-tactical-army' : 'text-tactical-silver/40'}`}
                        >
                            <Icon name="book-open" size={22} color={activeTab === 'FIELD_MANUAL' ? '#4B5320' : ''} />
                            <span className="text-[10px] font-black uppercase text-center leading-tight">Field Manual</span>
                        </button>
                    </nav>

                    {/* Modals */}
                    {showClearModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-tactical-bg/90 backdrop-blur-sm">
                            <div className="tactical-card p-8 max-w-xs w-full border-tactical-red/50 text-center space-y-6">
                                <h3 className="text-xl font-black uppercase text-tactical-red tracking-tighter">Purge Protocol</h3>
                                <p className="text-sm text-tactical-silver/60">Permanently wipe all logs? Confirm purge?</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={clearAllData} className="tactical-button bg-tactical-red py-3">Confirm Purge</button>
                                    <button onClick={() => setShowClearModal(false)} className="text-xs uppercase font-bold text-tactical-silver/40">Abort</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showIncompleteModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-tactical-bg/90 backdrop-blur-sm">
                            <div className="tactical-card p-8 max-w-xs w-full border-tactical-army/50 text-center space-y-6">
                                <h3 className="text-xl font-black uppercase text-tactical-army tracking-tighter">Mission not complete</h3>
                                <p className="text-sm text-tactical-silver/60">Are you sure? Not all objectives are complete</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={completeMission} className="tactical-button py-3">Advance</button>
                                    <button onClick={() => setShowIncompleteModal(false)} className="text-xs uppercase font-bold text-tactical-silver/40">Back to the mission</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {logToDelete && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-tactical-bg/90 backdrop-blur-sm">
                            <div className="tactical-card p-8 max-w-xs w-full border-tactical-red/50 text-center space-y-6">
                                <h3 className="text-xl font-black uppercase text-tactical-red tracking-tighter">Terminate Entry</h3>
                                <p className="text-sm text-tactical-silver/60">Redact this mission record?</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => terminateLog(logToDelete)} className="tactical-button bg-tactical-red py-3">Confirm Termination</button>
                                    <button onClick={() => setLogToDelete(null)} className="text-xs uppercase font-bold text-tactical-silver/40">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
